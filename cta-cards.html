<!--JS Component (web components / google lit)-->

<script
  src="cta-card.js"
  color="green"
  logo="android"
  title="Android App"
  description="Thousands of palettes in your pocket"
  cta="View on the Play Store"
  badge="true"></script>

<!--Web Component-->

<cta-card
  color="magenta"
  logo="android"
  title="Android App"
  description="Thousands of palettes in your pocket"
  cta="View on the Play Store"
  badge="true"></cta-card>

<!--Per usare il web component attaccare lo script in basso alla fine del body una sola volta-->

<script>
  class CtaCard extends HTMLElement {
    constructor() {
      super();
      this.innerHTML = this.getEl();
    }

    get html() {
      return `
      <div class="cta-card"><div class="cta-card__contents" color="${this.getAttribute(
          "color"
        )}" logo="${this.getAttribute("logo")}">
          ${
            this.getAttribute("badge") === "true"
              ? '<div class="badge badge--pink _m-l-1">New</div>'
              : ""
          }
          <div class="cta-card__contents__image"></div>
          <h3 class="cta-card__contents__title">${this.getAttribute("title")}</h3>
          <p class="cta-card__contents__paragraph">
            ${this.getAttribute("description")}
          </p>
          <div class="cta-card__contents__cta">
            <span>${this.getAttribute("cta")}</span>
          </div>
        </div>
      </div>`;
    }

    getEl() {
      return (document.createElement("template").innerHTML = this.html);
    }
  }
  window.customElements.define("cta-card", CtaCard);
</script>
